name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Deploy
        run: |
          gcloud config set project ai-bulk-image-generator-498616

          gcloud builds submit ai-bulk-python \
            --tag gcr.io/ai-bulk-image-generator-498616/ai-bulk-python

          gcloud run deploy ai-bulk-python \
            --image gcr.io/ai-bulk-image-generator-498616/ai-bulk-python \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
